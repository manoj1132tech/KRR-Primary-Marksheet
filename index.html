<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.R.R. JUNIOR HIGH SCHOOL - Portal</title>
    <style>
        :root { --blue: #1a237e; --red: #d32f2f; --gold: #b8860b; --green: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; }
        
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 18px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }

        .step-box { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f9f9f9; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        .btn-action { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .list-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        .list-table th, .list-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .list-table th { background: #1a237e; color: white; }

        /* --- MARKSHEET DESIGN (PREMIUM) --- */
        @page { size: A4; margin: 0; }
        .marksheet-page {
            width: 210mm; height: 296mm; padding: 25mm; margin: 0 auto;
            background: #fff !important; position: relative; box-sizing: border-box;
            page-break-after: always; display: flex; flex-direction: column;
            border: 15px solid transparent;
            border-image: url('https://img.freepik.com/free-vector/floral-frame-design_1102-601.jpg') 15% round;
            
            /* Full Page Scattered Watermark */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 100 100'><text y='25%' x='15%' fill='rgba(255,105,180,0.1)' font-size='14'>🌸</text><text y='55%' x='75%' fill='rgba(255,105,180,0.1)' font-size='14'>🦋</text><text y='85%' x='35%' fill='rgba(255,105,180,0.1)' font-size='14'>☀️</text><text y='15%' x='85%' fill='rgba(255,105,180,0.1)' font-size='14'>🌻</text></svg>");
            background-repeat: repeat;
            -webkit-print-color-adjust: exact !important;
        }

        .m-header { text-align: center; border-bottom: 3px double var(--gold); padding-bottom: 10px; }
        .m-logo { width: 100px; height: 100px; margin-bottom: 5px; }
        .m-school-name { font-size: 34px; font-weight: 900; color: var(--green) !important; margin: 0; font-family: 'Times New Roman'; }
        .m-banner { background: #ffeb3b !important; color: #c62828 !important; padding: 8px 35px; border-radius: 50px; display: inline-block; font-size: 20px; font-weight: bold; border: 2px solid #c62828; margin: 12px 0; }
        
        .m-info-table { width: 100%; margin: 20px 0; font-size: 18px; border-collapse: collapse; }
        .m-info-table td { padding: 8px 5px; border-bottom: 1px dashed #bbb; }
        
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .m-marks-table th, .m-marks-table td { border: 2px solid #000; padding: 10px; text-align: center; font-weight: bold; }
        .m-marks-table th { background: #e3f2fd !important; color: #1a237e !important; }
        
        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 30px; }
        .m-sig-box { border-top: 1.5px solid #000; width: 160px; text-align: center; font-size: 14px; padding-top: 5px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="margin:0;">K.R.R. JUNIOR HIGH SCHOOL</h2>
    <button class="nav-btn active" id="btn-reg" onclick="showTab('reg')">ADMISSION</button>
    <button class="nav-btn" id="btn-list" onclick="showTab('list')">STUDENT LIST/EDIT</button>
    <button class="nav-btn" id="btn-teacher" onclick="showTab('teacher')">MARKS ENTRY</button>
    <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">PRINT</button>
</div>

<div class="container no-print">
    <div id="reg" class="section active">
        <h3>New Admission</h3>
        <div class="step-box">
            <input type="text" id="rName" placeholder="Student Name">
            <input type="text" id="rFather" placeholder="Father's Name">
            <input type="text" id="rMother" placeholder="Mother's Name">
            <input type="date" id="rDOB">
            <select id="rClass"><option>NC</option><option>LKG</option><option>UKG</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select>
            <input type="text" id="rSR" placeholder="SR Number (Optional)">
            <button class="btn-action" onclick="registerStudent()">SAVE DATA</button>
        </div>
    </div>

    <div id="list" class="section">
        <h3>Class Wise Student List</h3>
        <select id="lClass" onchange="loadStudentList()"><option value="">-- Select Class --</option><option>NC</option><option>LKG</option><option>UKG</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select>
        <div id="listView" style="margin-top:15px; overflow-x:auto;"></div>
    </div>

    <div id="teacher" class="section">
        <h3>Marks Entry (Max 50)</h3>
        <select id="tClass" onchange="filterForMarks()"><option value="">-- Select Class --</option><option>NC</option><option>LKG</option><option>UKG</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select>
        <div id="studentSelArea" style="display:none; margin-top:15px;">
            <select id="tStudent" onchange="resetMarksFields()"></select>
            <div class="step-box" style="margin-top:10px;">
                <label>Subject</label>
                <select id="tSub" onchange="resetMarksFields()">
                    <option>HINDI</option><option>ENGLISH</option><option>MATHS</option><option>DRAWING</option><option>STORY TELLING</option>
                </select>
                <label>Half Yearly (Max 50)</label>
                <input type="number" id="m1" placeholder="Enter (0-50)">
                <label>Annual (Max 50)</label>
                <input type="number" id="m2" placeholder="Enter (0-50)">
                <button class="btn-action" onclick="saveMarks()">UPDATE MARKS</button>
            </div>
        </div>
    </div>

    <div id="admin" class="section">
        <h3>Admin Print Panel</h3>
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button class="btn-action" onclick="unlockPrint()">UNLOCK</button>
        <div id="print-area" style="display:none; margin-top:20px;">
            <select id="printClass"><option>NC</option><option>LKG</option><option>UKG</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select>
            <button class="btn-action" style="background:var(--red);" onclick="generatePrint()">GENERATE MARKSHEETS</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyCab2COguK8jw4bhzMeB5qS5mcqYT518vzrVV0DbkmLA38GQrUDhi8FmKW_ZnZEU1l/exec"; // APNA URL YAHAN DALEIN
    let MASTER = [];

    async function sync() {
        try { const res = await fetch(API); MASTER = await res.json(); } catch(e) { console.error("Sync Error", e); }
    }
    sync();

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        document.getElementById('btn-' + id).classList.add('active');
    }

    function resetMarksFields() {
        document.getElementById('m1').value = "";
        document.getElementById('m2').value = "";
    }

    // LIST VIEW LOGIC
    function loadStudentList() {
        const cls = document.getElementById('lClass').value;
        if(!cls) return;
        let html = '<table class="list-table"><tr><th>Name</th><th>Father</th><th>DOB</th><th>Action</th></tr>';
        MASTER.forEach((r, i) => {
            if(i>0 && r[3] == cls) {
                html += `<tr>
                    <td><input id="en${i}" value="${r[0]}" style="width:100%; border:none;"></td>
                    <td><input id="ef${i}" value="${r[2]}" style="width:100%; border:none;"></td>
                    <td><input id="ed${i}" value="${r[5]}" style="width:100%; border:none;"></td>
                    <td><button onclick="updateStudent(${i})">Save</button></td>
                </tr>`;
            }
        });
        document.getElementById('listView').innerHTML = html + '</table>';
    }

    async function updateStudent(idx) {
        const rowData = [document.getElementById('en'+idx).value, MASTER[idx][1], document.getElementById('ef'+idx).value, MASTER[idx][3], MASTER[idx][4], document.getElementById('ed'+idx).value];
        await fetch(API, { method:"POST", body: JSON.stringify({action:"editStudent", row: idx+1, data: rowData}) });
        alert("Updated!"); sync();
    }

    function filterForMarks() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Select Student --</option>';
        MASTER.forEach((r, i) => { if(i>0 && r[3] == cls) sel.add(new Option(r[0], i)); });
        document.getElementById('studentSelArea').style.display='block';
    }

    async function saveMarks() {
        const idx = document.getElementById('tStudent').value;
        const sub = document.getElementById('tSub').value;
        const m1 = document.getElementById('m1').value;
        const m2 = document.getElementById('m2').value;
        if(m1 > 50 || m2 > 50) { alert("Max marks is 50"); return; }
        
        let marks = MASTER[idx][6] ? JSON.parse(MASTER[idx][6]) : {};
        marks[sub] = [m1, m2];
        await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMarks", row: parseInt(idx)+1, marks: JSON.stringify(marks)}) });
        alert("Success!"); sync();
    }

    function getStars(total) {
        if(total >= 90) return "⭐⭐⭐⭐⭐";
        if(total >= 75) return "⭐⭐⭐⭐";
        if(total >= 60) return "⭐⭐⭐";
        if(total >= 45) return "⭐⭐";
        return "⭐";
    }

    function unlockPrint() {
        if(document.getElementById('adminPass').value === "admin123") {
            document.getElementById('print-area').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] == cls) {
                let marks = r[6] ? JSON.parse(r[6]) : {};
                let subjects = ["HINDI", "ENGLISH", "MATHS", "DRAWING", "STORY TELLING"];
                let tableRows = '';
                subjects.forEach(s => {
                    let m = marks[s] || ["", ""];
                    let t = (parseInt(m[0]) || 0) + (parseInt(m[1]) || 0);
                    let st = (m[0] !== "" || m[1] !== "") ? getStars(t) : "";
                    tableRows += `<tr><td>${s}</td><td>${m[0]}</td><td>${m[1]}</td><td>${t}</td><td style="color:var(--gold)">${st}</td></tr>`;
                });
                html += `
                <div class="marksheet-page">
                    <div class="m-header">
                        <img src="logo.jpg" class="m-logo">
                        <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                        <p style="font-weight:bold; margin:0;">MANPUR BAHERI, BAREILLY (U.P.)</p>
                        <p style="font-weight:bold; margin:0;">Session: 2025-26</p>
                        <div class="m-banner">ANNUAL REPORT CARD</div>
                    </div>
                    <table class="m-info-table">
                        <tr><td>NAME: <b>${r[0]}</b></td><td>SR: <b>${r[4] || ''}</b></td></tr>
                        <tr><td>FATHER: <b>${r[2]}</b></td><td>CLASS: <b>${r[3]}</b></td></tr>
                        <tr><td>MOTHER: <b>${r[1]}</b></td><td>DOB: <b>${r[5]}</b></td></tr>
                    </table>
                    <table class="m-marks-table">
                        <thead><tr><th>SUBJECT</th><th>HY(50)</th><th>ANN(50)</th><th>TOTAL</th><th>GRADE</th></tr></thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                    <div class="m-sig-row">
                        <div class="m-sig-box">Guardian</div><div class="m-sig-box">Teacher</div><div class="m-sig-box">Principal</div>
                    </div>
                </div>`;
            }
        });
        const w = window.open();
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 1000);
    }

    async function registerStudent() {
        const data = [document.getElementById('rName').value, "MRS. "+document.getElementById('rMother').value, "MR. "+document.getElementById('rFather').value, document.getElementById('rClass').value, document.getElementById('rSR').value, document.getElementById('rDOB').value.split("-").reverse().join("/")];
        await fetch(API, { method:"POST", body: JSON.stringify({action:"registerStudent", data: data}) });
        alert("Registered!"); sync();
    }
</script>
</body>
</html>
