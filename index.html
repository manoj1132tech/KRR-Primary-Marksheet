<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>K.R.R. School Portal - New System</title>
    <style>
        :root { --blue: #1a237e; --red: #b71c1c; --gold: #8c6d05; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; }
        .nav-header { background: var(--blue); padding: 15px; text-align: center; color: white; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px 15px; cursor: pointer; margin: 5px; border-radius: 5px; }
        .nav-btn.active { background: var(--red); border-color: var(--red); }
        .container { max-width: 800px; margin: 25px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 6px; }

        /* Marksheet CSS */
        @page { size: A4; margin: 0; }
        .marksheet-page { width: 210mm; height: 296mm; padding: 20mm; margin: 0 auto; background: #fff; position: relative; box-sizing: border-box; page-break-after: always; border: 15px solid transparent; border-image: url('https://www.transparenttextures.com/patterns/gold-scale.png') 30 stretch; outline: 2px solid var(--gold); outline-offset: -10px; }
        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .m-school-name { font-size: 30px; font-weight: 900; color: var(--red); margin: 0; font-family: 'Georgia', serif; }
        .m-banner { background: var(--red); color: white; padding: 5px 25px; border-radius: 50px; display: inline-block; font-weight: bold; margin: 15px 0; }
        .m-info-table { width: 100%; margin: 20px 0; font-size: 16px; border-collapse: collapse; }
        .m-info-table td { padding: 8px 5px; border-bottom: 1px dashed #ccc; }
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .m-marks-table th, .m-marks-table td { border: 1.5px solid #000; padding: 10px; text-align: center; font-weight: bold; }
        .result-box { margin-top: 20px; border: 2px solid var(--blue); display: flex; background: #f1f3f9; padding: 15px; }
        .res-item { flex: 1; text-align: center; color: var(--blue); font-size: 18px; font-weight: 900; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="nav-header no-print">
    <h2>K.R.R. JUNIOR HIGH SCHOOL - PORTAL</h2>
    <button class="nav-btn" onclick="showTab('reg')">ADMISSION</button>
    <button class="nav-btn active" onclick="showTab('teacher')">MARKS & GRADE ENTRY</button>
    <button class="nav-btn" onclick="showTab('admin')">PRINT REPORT</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <h3>Teacher Panel: Enter Marks/Grades</h3>
        <select id="tClass" onchange="filterStudents()"><option value="">-- Select Class --</option><option>NC</option><option>LKG</option><option>UKG</option><option>I</option></select>
        
        <div id="mInput" style="display:none; margin-top:15px;">
            <select id="tStudent"></select>
            <select id="tSub" onchange="toggleInputType()">
                <option value="HINDI">HINDI (ORAL + WRITTEN)</option>
                <option value="MATHS">MATHS (ORAL + WRITTEN)</option>
                <option value="ENGLISH">ENGLISH (ORAL + WRITTEN)</option>
                <option value="STORY">STORY TELLING (GRADE ONLY)</option>
                <option value="PHYSICAL">PHYSICAL ACTIVITY (GRADE ONLY)</option>
            </select>

            <div id="scoreFields">
                <input type="number" id="mOral" placeholder="Oral Marks (Max 20)">
                <input type="number" id="mWritten" placeholder="Written Marks (Max 80)">
            </div>

            <div id="gradeFields" style="display:none;">
                <select id="mGrade">
                    <option value="">-- Select Grade --</option>
                    <option value="A+">A+</option><option value="A">A</option>
                    <option value="B">B</option><option value="C">C</option>
                </select>
            </div>

            <button class="btn-action" onclick="saveData()">SAVE ENTRY</button>
        </div>
    </div>
    
    <div id="admin" class="section">
        <h3>Print Panel</h3>
        <button class="btn-action" style="background:var(--red);" onclick="generateReport()">GENERATE ALL MARKSHEETS</button>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleInputType() {
        const sub = document.getElementById('tSub').value;
        if(sub === 'STORY' || sub === 'PHYSICAL') {
            document.getElementById('scoreFields').style.display = 'none';
            document.getElementById('gradeFields').style.display = 'block';
        } else {
            document.getElementById('scoreFields').style.display = 'block';
            document.getElementById('gradeFields').style.display = 'none';
        }
    }

    function filterStudents() {
        // Yahan database se student list aayegi
        document.getElementById('tStudent').innerHTML = '<option>Example Student</option>';
        document.getElementById('mInput').style.display = 'block';
    }

    // Marksheet Logic
    function generateReport() {
        let subjects = [
            {n: "HINDI (ORAL+WRITTEN)", m: "85", g: "A"},
            {n: "MATHS (ORAL+WRITTEN)", m: "90", g: "A+"},
            {n: "ENGLISH (ORAL+WRITTEN)", m: "78", g: "B"},
            {n: "STORY TELLING", m: "-", g: "A"}, // Grade Entry
            {n: "PHYSICAL ACTIVITY", m: "-", g: "A+"} // Grade Entry
        ];

        let rows = '';
        subjects.forEach(s => {
            rows += `<tr><td>${s.n}</td><td>${s.m}</td><td>${s.g}</td></tr>`;
        });

        let html = `
        <div class="marksheet-page">
            <div class="m-header">
                <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                <p>MANPUR BAHERI, BAREILLY | SESSION 2025-26</p>
                <div class="m-banner">ANNUAL PROGRESS REPORT</div>
            </div>
            <table class="m-info-table">
                <tr><td>NAME: <b>ARJUN KUMAR</b></td><td>CLASS: <b>NC</b></td></tr>
            </table>
            <table class="m-marks-table">
                <thead><tr><th>SUBJECT</th><th>MARKS (100)</th><th>GRADE</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="result-box">
                <div class="res-item">RESULT: PASSED</div>
            </div>
        </div>`;
        
        const w = window.open();
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
    }
</script>
</body>
</html>
