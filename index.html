<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR Junior School Portal</title>
    <style>
        :root { --blue: #0d47a1; --red: #b71c1c; --gold: #8e6d05; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-transform: uppercase; }
        
        .nav-bar { background: var(--blue); padding: 10px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px 20px; cursor: pointer; border-radius: 5px; margin: 3px; font-weight: bold; }
        .nav-btn.active { background: var(--red); border-color: white; }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }
        
        h2 { color: var(--blue); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; text-transform: uppercase; }
        
        .btn-save { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-edit { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--blue); color: white; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="color:white; border:none; margin:5px 0;">K.R.R. JUNIOR SCHOOL</h2>
    <button class="nav-btn active" onclick="openPage('regPage')">REGISTRATION</button>
    <button class="nav-btn" onclick="openPage('editPage')">EDIT DETAILS</button>
    <button class="nav-btn" onclick="openPage('marksPage')">MARKS ENTRY</button>
    <button class="nav-btn" onclick="openPage('adminPage')">ADMIN PANEL</button>
</div>

<div class="container no-print">
    <div id="regPage" class="page active">
        <h2>Student Registration</h2>
        <div class="form-grid">
            <input type="text" id="rName" placeholder="STUDENT NAME">
            <input type="text" id="rMother" placeholder="MOTHER'S NAME">
            <input type="text" id="rFather" placeholder="FATHER'S NAME">
            <input type="text" id="rRoll" placeholder="ROLL NO">
            <select id="rClass"><option value="">SELECT CLASS</option><option>N.C</option><option>LKG</option><option>UKG</option></select>
            <div style="display:flex; gap:5px;">
                <select id="dobD"><option value="">DD</option></select>
                <select id="dobM"><option value="">MM</option></select>
                <select id="dobY"><option value="">YYYY</option></select>
            </div>
        </div>
        <button class="btn-save" onclick="register()">SAVE STUDENT DATA</button>
    </div>

    <div id="adminPage" class="page">
        <h2>Generate Reports</h2>
        <select id="pClass"><option>N.C</option><option>LKG</option><option>UKG</option></select>
        <button class="btn-save" style="background:var(--red);" onclick="printAll()">PRINT ALL MARKSHEETS</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxI_C21vAE2O4ai97URuiyL3kQCepWDwChh4ROvJ4jDuatP_YODjgiuL3_vrnUK-ps4uQ/exec"; 
    let MASTER = [];

    for(let i=1; i<=31; i++) document.getElementById('dobD').add(new Option(i, i<10?'0'+i:i));
    ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].forEach((m,i)=>document.getElementById('dobM').add(new Option(m, i+1<10?'0'+(i+1):i+1)));
    for(let i=2024; i>=2015; i--) document.getElementById('dobY').add(new Option(i, i));

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        sync();
    }

    async function sync() { try { const res = await fetch(API); MASTER = await res.json(); } catch(e){ console.error("Sync Error", e); } }

    async function register() {
        const d = document.getElementById('dobD').value, m = document.getElementById('dobM').value, y = document.getElementById('dobY').value;
        if(!d || !m || !y) { alert("SELECT FULL DATE"); return; }
        const data = [document.getElementById('rName').value, document.getElementById('rMother').value, document.getElementById('rFather').value, document.getElementById('rClass').value, document.getElementById('rRoll').value, `${d}/${m}/${y}`];
        await fetch(API, { method: "POST", mode: 'no-cors', body: JSON.stringify({action: "appendStudent", rowData: data}) });
        alert("SAVED!"); sync();
    }

    function getStars(total) {
        if(total >= 90) return '⭐⭐⭐⭐⭐';
        if(total >= 80) return '⭐⭐⭐⭐';
        if(total >= 70) return '⭐⭐⭐';
        if(total >= 60) return '⭐⭐';
        if(total >= 50) return '⭐';
        return '0';
    }

    function fmt(val) { let n = parseInt(val || 0); return n < 10 ? '0' + n : n; }

    function getRemarks(total) {
        if(total >= 510) return "EXCELLENT PERFORMANCE!";
        if(total >= 420) return "VERY GOOD WORK!";
        if(total >= 330) return "GOOD, KEEP IMPROVING.";
        if(total >= 210) return "SATISFACTORY, WORK HARDER.";
        return "POOR, NEEDS SPECIAL ATTENTION.";
    }

    function getNextClass(current) {
        if(current === "N.C") return "LKG";
        if(current === "LKG") return "UKG";
        if(current === "UKG") return "1st";
        return "-";
    }

    function printAll() {
        const cls = document.getElementById('pClass').value;
        let content = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] === cls) {
                let m = {}; try { m = JSON.parse(r[6] || "{}"); } catch(e) {}
                let grand = 0;
                let subs = ["HINDI ORAL", "HINDI WRITTEN", "ENGLISH ORAL", "ENGLISH WRITTEN", "MATHEMATICS ORAL", "MATHEMATICS WRITTEN"];
                
                let rows = subs.map((s, idx) => {
                    let u1 = parseInt(m[s+'_UT1']||0), h = parseInt(m[s+'_HY']||0), u2 = parseInt(m[s+'_UT2']||0), a = parseInt(m[s+'_AN']||0);
                    let t = u1 + h + u2 + a; grand += t;
                    let bg = idx % 2 === 0 ? '#ffffff' : '#f2f7ff';
                    return `<tr style="height:35px; background:${bg};">
                        <td style="color:#0d47a1; font-weight:bold; text-align:left; padding-left:15px; border-left:5px solid #0d47a1;">${s}</td>
                        <td>${fmt(u1)}</td><td>${fmt(h)}</td><td>${fmt(u2)}</td><td>${fmt(a)}</td>
                        <td style="font-weight:bold; background:#e8f0fe;">${fmt(t)}</td>
                        <td style="color:#b71c1c; font-size:11px;">${getStars(t)}</td>
                    </tr>`;
                }).join('');

                const gradeSubs = ["STORY TELLING", "PHYSICAL ACTIVITY"];
                gradeSubs.forEach(s => {
                    rows += `<tr style="height:35px; background:white;">
                        <td style="color:#0d47a1; font-weight:bold; text-align:left; padding-left:15px; border-left:5px solid #0d47a1;">${s}</td>
                        <td colspan="4" style="color:#8e6d05; font-size:12px; font-weight:bold; background:#fffcf0;">GRADE BASED ASSESSMENT</td>
                        <td style="font-weight:bold; background:#e8f0fe;">-</td>
                        <td style="color:#b71c1c; font-weight:bold;">${m[s+'_GRADE'] || '-'}</td>
                    </tr>`;
                });

                let perc = ((grand / 600) * 100).toFixed(2);
                let resultStatus = grand >= 210 ? 'PASSED' : 'FAILED';
                let remarks = getRemarks(grand);
                let promoted = resultStatus === 'PASSED' ? getNextClass(r[3]) : 'RETAINED';

                content += `
                <div style="width:190mm; height:277mm; padding:10mm; margin:5mm auto; border:10px double #0d47a1; box-sizing:border-box; page-break-after:always; position:relative; background:white;">
                    <div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0.20; z-index:0;">
                        ${Array.from({length: 40}).map(() => `<span style="position:absolute; top:${Math.random()*95}%; left:${Math.random()*95}%; font-size:25px;">🌸</span>`).join('')}
                    </div>

                    <div style="position:relative; z-index:1;">
                        <center>
                            <img src="logo.jpg" style="width:75px; height:75px; margin-bottom:5px;" onerror="this.style.display='none'">
                            <h1 style="color:#b71c1c; margin:0; font-size:32px;">K.R.R. JUNIOR HIGH SCHOOL</h1>
                            <p style="margin:2px 0; font-weight:bold; font-size:13px;">MANPUR, BAHERI, BAREILLY (U.P.)</p>
                            <h3 style="color:#8e6d05; margin:5px 0;">ACADEMIC SESSION: 2025-2026</h3>
                            <div style="background:#0d47a1; color:white; padding:5px 30px; border-radius:20px; font-weight:bold; display:inline-block;">PROGRESS REPORT</div>
                        </center>

                        <table style="width:100%; margin:15px 0; border:2px solid #0d47a1; padding:12px; border-radius:12px; font-size:18px; border-collapse:separate; border-spacing:0 8px;">
                            <tr>
                                <td style="color:black; font-weight:bold; text-transform:none;">Student name: <span style="color:#b71c1c; font-size:16px; text-transform:uppercase;">${r[0]}</span></td>
                                <td style="color:black; font-weight:bold; text-transform:none;">Roll no: <span style="color:#0d47a1; font-size:16px;">${r[4]}</span></td>
                            </tr>
                            <tr>
                                <td style="color:black; font-weight:bold; text-transform:none;">Father's name: <span style="color:#0d47a1; font-size:16px; text-transform:uppercase;">Mr. ${r[2]}</span></td>
                                <td style="color:black; font-weight:bold; text-transform:none;">Mother's name: <span style="color:#0d47a1; font-size:16px; text-transform:uppercase;">Mrs. ${r[1]}</span></td>
                            </tr>
                            <tr>
                                <td style="color:black; font-weight:bold; text-transform:none;">Class: <span style="color:#b71c1c; font-size:16px;">${r[3]}</span></td>
                                <td style="color:black; font-weight:bold;">D.O.B: <span style="color:#0d47a1; font-size:16px;">${r[5]}</span></td>
                            </tr>
                        </table>

                        <table border="1" style="width:100%; text-align:center; border-collapse:collapse; font-size:12px; border:2px solid #0d47a1;">
                            <thead>
                                <tr style="background: linear-gradient(180deg, #0d47a1 0%, #002171 100%); color:white; height:35px;">
                                    <th>SUBJECTS</th><th>UT-1</th><th>HY</th><th>UT-2</th><th>ANNUAL</th><th>TOTAL</th><th>GRADE</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>

                        <div style="margin-top:15px; border:2px solid #8e6d05; padding:10px; display:grid; grid-template-columns:1fr 1fr 1fr; font-weight:bold; background:#fff9e6; border-radius:8px;">
                            <div>TOTAL: <span style="color:#b71c1c;">${grand}/600</span></div>
                            <div style="text-align:center;">PERCENTAGE: <span style="color:#0d47a1;">${perc}%</span></div>
                            <div style="text-align:right;">RESULT: <span style="color:#b71c1c;">${resultStatus}</span></div>
                        </div>

                        <div style="margin-top:10px; border:1px solid #0d47a1; padding:10px; border-radius:8px; background:#f0f7ff;">
                            <div style="color:#0d47a1; font-weight:bold; margin-bottom:5px;">Teacher's Remarks: <span style="color:#b71c1c; font-weight:bold;">${remarks}</span></div>
                            <div style="color:#0d47a1; font-weight:bold;">Promoted to Class: <span style="color:#2e7d32; font-weight:bold;">${promoted}</span></div>
                        </div>

                        <div style="margin-top:55px; display:flex; justify-content:space-between; padding:0 10px;">
                            <span style="border-top:1px solid #000; width:150px; text-align:center; font-size:12px; font-weight:bold; padding-top:5px;">CLASS TEACHER</span>
                            <span style="border-top:1px solid #000; width:150px; text-align:center; font-size:12px; font-weight:bold; padding-top:5px;">PRINCIPAL SIGN</span>
                        </div>

                        <div style="text-align:center; margin-top:40px; color:#b71c1c; font-size:22px;">
                             🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸
                        </div>
                    </div>
                </div>`;
            }
        });
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>@page{size: A4; margin:0;} body{margin:0; text-transform:uppercase;}</style></head><body>${content}</body></html>`);
        win.document.close();
        setTimeout(() => win.print(), 1000);
    }
    sync();
</script>
</body>
</html>
