<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K.R.R. JUNIOR HIGH SCHOOL - Official Portal</title>
    <style>
        :root { --blue: #1a237e; --red: #d32f2f; --gold: #b8860b; --green: #2e7d32; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; }
        
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 18px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); }

        .container { max-width: 950px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }

        .step-box { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f9f9f9; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #444; font-size: 13px; }
        select, input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
        .btn-action { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }

        /* --- MARKSHEET DESIGN --- */
        @page { size: A4; margin: 0; }
        .marksheet-page {
            width: 210mm; height: 296mm; padding: 18mm; margin: 0 auto;
            background: #fff !important; position: relative; box-sizing: border-box;
            page-break-after: always; display: flex; flex-direction: column;
            border: 15px solid transparent;
            border-image: url('https://img.freepik.com/free-vector/floral-frame-design_1102-601.jpg') 15% round;
            -webkit-print-color-adjust: exact !important;
        }

        /* Scattered Watermark Implementation (0.7 Opacity) */
        .watermark-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.7;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 200 200'><text y='30' x='20' font-size='25'>🌻</text><text y='170' x='150' font-size='25'>🦋</text><text y='100' x='100' font-size='30'>☀️</text><text y='40' x='160' font-size='20'>🌸</text><text y='160' x='30' font-size='22'>🌻</text></svg>");
            background-repeat: repeat;
        }

        .m-content { position: relative; z-index: 1; }
        .m-header { text-align: center; border-bottom: 3px double var(--gold); padding-bottom: 10px; }
        .m-school-name { font-size: 32px; font-weight: 900; color: var(--green) !important; margin: 0; font-family: 'Times New Roman'; }
        .m-banner { background: #ffeb3b !important; color: #c62828 !important; padding: 5px 30px; border-radius: 50px; display: inline-block; font-size: 18px; font-weight: bold; border: 2px solid #c62828; margin: 10px 0; }
        
        .m-info-table { width: 100%; margin: 15px 0; font-size: 16px; border-collapse: collapse; }
        .m-info-table td { padding: 6px 5px; border-bottom: 1px dashed #bbb; }
        
        .m-marks-table { width: 100%; border-collapse: collapse; border: 1.5px solid #000; margin-top: 10px; }
        .m-marks-table th, .m-marks-table td { border: 1.5px solid #000; padding: 6px; text-align: center; font-weight: bold; font-size: 13px; }
        .m-marks-table th { background: #e3f2fd !important; }

        .m-result-row { border: 2px solid #000; margin-top: 15px; display: flex; background: #fffde7 !important; padding: 10px; }
        .res-item { flex: 1; text-align: center; font-weight: 900; font-size: 15px; }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 20px; }
        .m-sig-box { border-top: 1.5px solid #000; width: 140px; text-align: center; font-size: 12px; padding-top: 5px; font-weight: bold; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="margin:0;">K.R.R. JUNIOR HIGH SCHOOL - PORTAL</h2>
    <button class="nav-btn active" id="btn-reg" onclick="showTab('reg')">ADMISSION</button>
    <button class="nav-btn" id="btn-teacher" onclick="showTab('teacher')">MARKS ENTRY</button>
    <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">PRINT</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section">
        <h3>Academic Entry (Max 50 for Written/Oral)</h3>
        <select id="tClass" onchange="filterForMarks()"><option value="">-- Select Class --</option><option>NC</option><option>LKG</option><option>UKG</option><option>I</option><option>II</option><option>III</option></select>
        
        <div id="studentSelArea" style="display:none; margin-top:15px;">
            <select id="tStudent" onchange="resetMarksFields()"></select>
            <div class="step-box" style="margin-top:10px;">
                <label>Subject</label>
                <select id="tSub" onchange="resetMarksFields()">
                    <option value="HINDI">HINDI (ORAL + WRITTEN)</option>
                    <option value="MATHS">MATHS (ORAL + WRITTEN)</option>
                    <option value="ENGLISH">ENGLISH (ORAL + WRITTEN)</option>
                    <option value="DRAWING">DRAWING</option>
                    <option value="STORY">STORY TELLING</option>
                    <option value="PHYSICAL">PHYSICAL ACTIVITY</option>
                </select>
                
                <div id="scoreInputs">
                    <label>Oral Marks (Max 50)</label>
                    <input type="number" id="m1" placeholder="0-50" max="50">
                    <label>Written Marks (Max 50)</label>
                    <input type="number" id="m2" placeholder="0-50" max="50">
                </div>
                
                <button class="btn-action" id="markBtn" onclick="saveMarks()">SAVE SUBJECT MARKS</button>
            </div>
        </div>
    </div>

    <div id="reg" class="section active">
        <h3>New Admission</h3>
        <div class="step-box">
            <input type="text" id="rName" placeholder="Student Name">
            <input type="text" id="rFather" placeholder="Father's Name">
            <input type="text" id="rMother" placeholder="Mother's Name">
            <input type="date" id="rDOB">
            <select id="rClass"><option>NC</option><option>LKG</option><option>UKG</option><option>I</option></select>
            <input type="text" id="rSR" placeholder="SR Number">
            <button class="btn-action" onclick="registerStudent()">REGISTER STUDENT</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h3>Generate Report Cards</h3>
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button class="btn-action" onclick="unlockPrint()">UNLOCK & GENERATE</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxJg2qtc8seNb6032pl3Y3pahwyKc24B-0a5Bh2BtbZyioJOR11ySkavPfyTv2wyd6MpQ/exec"; 
    let MASTER = [];

    async function sync() {
        try { const res = await fetch(API); MASTER = await res.json(); } catch(e) { console.log("Sync Error"); }
    }
    sync();

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function filterForMarks() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        MASTER.forEach((r, i) => { if(i>0 && r[3] == cls) sel.add(new Option(r[0], i)); });
        document.getElementById('studentSelArea').style.display='block';
    }

    function resetMarksFields() { document.getElementById('m1').value = ""; document.getElementById('m2').value = ""; }

    function getGrade(total) {
        if(total >= 90) return "A+"; if(total >= 75) return "A";
        if(total >= 60) return "B"; if(total >= 45) return "C";
        return "D";
    }

    async function saveMarks() {
        const idx = document.getElementById('tStudent').value;
        const sub = document.getElementById('tSub').value;
        const m1 = document.getElementById('m1').value || 0;
        const m2 = document.getElementById('m2').value || 0;
        
        let marks = MASTER[idx][6] ? JSON.parse(MASTER[idx][6]) : {};
        marks[sub] = [m1, m2];
        
        await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMarks", row: parseInt(idx)+1, marks: JSON.stringify(marks)}) });
        alert("Success!"); sync();
    }

    function unlockPrint() {
        if(document.getElementById('adminPass').value === "admin123") { generatePrint(); } else { alert("Wrong Pass"); }
    }

    function generatePrint() {
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0) {
                let marks = r[6] ? JSON.parse(r[6]) : {};
                let subjects = ["HINDI", "MATHS", "ENGLISH", "DRAWING", "STORY", "PHYSICAL"];
                let tableRows = '';
                let grandTotal = 0;

                subjects.forEach(s) => {
                    let m = marks[s] || [0, 0];
                    let t = parseInt(m[0]) + parseInt(m[1]);
                    grandTotal += t;
                    
                    if(s === "STORY" || s === "PHYSICAL") {
                        tableRows += `<tr><td>${s}</td><td colspan="3">GRADING SYSTEM</td><td>${getGrade(t)}</td></tr>`;
                    } else {
                        tableRows += `<tr><td>${s}</td><td>${m[0]}</td><td>${m[1]}</td><td>${t}</td><td>${getGrade(t)}</td></tr>`;
                    }
                });

                let perc = (grandTotal / 6).toFixed(1);
                let result = perc >= 33 ? "PASSED" : "FAILED";

                html += `
                <div class="marksheet-page">
                    <div class="watermark-layer"></div>
                    <div class="m-content">
                        <div class="m-header">
                            <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                            <p style="font-weight:bold; margin:0;">MANPUR BAHERI, BAREILLY (U.P.)</p>
                            <div class="m-banner">ANNUAL PROGRESS REPORT</div>
                        </div>
                        <table class="m-info-table">
                            <tr><td>STUDENT: <b>${r[0]}</b></td><td>SR: <b>${r[4]||''}</b></td></tr>
                            <tr><td>FATHER: <b>${r[2]}</b></td><td>CLASS: <b>${r[3]}</b></td></tr>
                        </table>
                        <table class="m-marks-table">
                            <thead><tr><th>SUBJECT</th><th>ORAL(50)</th><th>WRIT.(50)</th><th>TOTAL</th><th>GRADE</th></tr></thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                        <div class="m-result-row">
                            <div class="res-item">TOTAL: ${grandTotal}/600</div>
                            <div class="res-item">PERCENT: ${perc}%</div>
                            <div class="res-item">RESULT: ${result}</div>
                        </div>
                        <div class="m-sig-row">
                            <div class="m-sig-box">Guardian Sign</div>
                            <div class="m-sig-box">Class Teacher</div>
                            <div class="m-sig-box">Principal</div>
                        </div>
                    </div>
                </div>`;
            }
        });
        const w = window.open();
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 1000);
    }
</script>
</body>
</html>
