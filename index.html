<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR Junior School - Portal</title>
    <style>
        :root { --blue: #0d47a1; --red: #b71c1c; --gold: #8e6d05; --school-name: #b71c1c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-transform: uppercase; }
        
        .nav-bar { background: var(--blue); padding: 10px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px 20px; cursor: pointer; border-radius: 5px; margin: 3px; font-weight: bold; }
        .nav-btn.active { background: var(--red); border-color: white; }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }
        
        h2 { color: var(--blue); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; text-transform: uppercase; }
        
        .btn-save { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: var(--blue); color: white; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="color:white; border:none; margin:5px 0;">K.R.R. JUNIOR SCHOOL</h2>
    <button class="nav-btn active" onclick="openPage('regPage')">REGISTRATION</button>
    <button class="nav-btn" onclick="openPage('editPage')">EDIT DETAILS</button>
    <button class="nav-btn" onclick="openPage('marksPage')">MARKS ENTRY</button>
    <button class="nav-btn" onclick="openPage('adminPage')">ADMIN PANEL</button>
</div>

<div class="container no-print">
    <div id="regPage" class="page active">
        <h2>Student Registration</h2>
        <div class="form-grid">
            <input type="text" id="rName" placeholder="STUDENT NAME">
            <input type="text" id="rMother" placeholder="MOTHER'S NAME">
            <input type="text" id="rFather" placeholder="FATHER'S NAME">
            <input type="text" id="rRoll" placeholder="ROLL NO">
            <select id="rClass">
                <option value="NURSERY">NURSERY</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
            </select>
            <div style="display:flex; gap:5px;">
                <select id="dobD"></select><select id="dobM"></select><select id="dobY"></select>
            </div>
        </div>
        <button class="btn-save" id="regBtn" onclick="register()">SAVE STUDENT DATA</button>
    </div>

    <div id="editPage" class="page">
        <h2>Edit Student Records</h2>
        <select id="eClass" onchange="loadEditTable()" style="margin-bottom: 20px;">
            <option value="">-- SELECT CLASS --</option>
            <option>NURSERY</option><option>LKG</option><option>UKG</option>
        </select>
        <div id="editArea"></div>
    </div>

    <div id="marksPage" class="page">
        <h2>Marks Entry</h2>
        <div class="form-grid">
            <select id="mClass" onchange="filterStudents()"><option value="">-- CLASS --</option><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
            <select id="mStudent" onchange="showStudentDetail()"></select>
        </div>
        <div id="mDetailBox" style="padding:15px; background:#e3f2fd; margin:15px 0; display:none;"></div>
        <div id="marksForm" style="display:none;">
            <select id="mSub" onchange="handleSubjectChange()" style="margin-bottom:10px;">
                <option value="">-- SELECT SUBJECT --</option>
                <option>HINDI ORAL</option><option>HINDI WRITTEN</option>
                <option>ENGLISH ORAL</option><option>ENGLISH WRITTEN</option>
                <option>MATHEMATICS ORAL</option><option>MATHEMATICS WRITTEN</option>
                <option>STORY TELLING</option><option>PHYSICAL ACTIVITY</option>
            </select>
            <div id="normalMarks" class="form-grid">
                <input type="number" id="v1" placeholder="UT-1 (10)">
                <input type="number" id="v2" placeholder="HY (40)">
                <input type="number" id="v3" placeholder="UT-2 (10)">
                <input type="number" id="v4" placeholder="ANNUAL (40)">
            </div>
            <div id="gradeMarks" style="display:none;">
                <select id="gVal"><option>A</option><option>B</option><option>C</option></select>
            </div>
            <button class="btn-save" onclick="saveMarks()">UPDATE DATA</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <h2>Admin Panel</h2>
        <select id="pClass"><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
        <button class="btn-save" style="background:var(--red);" onclick="printAll()">GENERATE MARKSHEETS</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxI_C21vAE2O4ai97URuiyL3kQCepWDwChh4ROvJ4jDuatP_YODjgiuL3_vrnUK-ps4uQ/exec"; 
    let MASTER = [];

    for(let i=1; i<=31; i++) document.getElementById('dobD').add(new Option(i, i<10?'0'+i:i));
    ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].forEach((m,i)=>document.getElementById('dobM').add(new Option(m, i+1<10?'0'+(i+1):i+1)));
    for(let i=2024; i>=2015; i--) document.getElementById('dobY').add(new Option(i, i));

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        sync();
    }

    async function sync() {
        try { const res = await fetch(API); MASTER = await res.json(); } catch(e){}
    }

    function handleSubjectChange() {
        const sub = document.getElementById('mSub').value;
        const isGrade = (sub === "STORY TELLING" || sub === "PHYSICAL ACTIVITY");
        document.getElementById('normalMarks').style.display = isGrade ? "none" : "grid";
        document.getElementById('gradeMarks').style.display = isGrade ? "block" : "none";
    }

    async function register() {
        const dob = `${document.getElementById('dobD').value}/${document.getElementById('dobM').value}/${document.getElementById('dobY').value}`;
        const data = [document.getElementById('rName').value, document.getElementById('rMother').value, document.getElementById('rFather').value, document.getElementById('rClass').value, document.getElementById('rRoll').value, dob];
        await fetch(API, { method: "POST", mode: 'no-cors', body: JSON.stringify({action: "appendStudent", rowData: data}) });
        alert("SAVED!"); sync();
    }

    function filterStudents() {
        const cls = document.getElementById('mClass').value;
        const sel = document.getElementById('mStudent');
        sel.innerHTML = '<option value="">-- SELECT STUDENT --</option>';
        MASTER.forEach((r, i) => { if(i>0 && r[3]===cls) sel.add(new Option(r[0], i)); });
    }

    function showStudentDetail() {
        const i = document.getElementById('mStudent').value;
        if(!i) return;
        document.getElementById('mDetailBox').innerHTML = `<b>STUDENT:</b> ${MASTER[i][0]} | <b>ROLL:</b> ${MASTER[i][4]}`;
        document.getElementById('mDetailBox').style.display = 'block';
        document.getElementById('marksForm').style.display = 'block';
    }

    async function saveMarks() {
        const i = document.getElementById('mStudent').value;
        const sub = document.getElementById('mSub').value;
        let marksObj = {};
        if(sub === "STORY TELLING" || sub === "PHYSICAL ACTIVITY") {
            marksObj[sub + "_TOTAL"] = document.getElementById('gVal').value;
        } else {
            marksObj[sub + "_UT1"] = document.getElementById('v1').value;
            marksObj[sub + "_HY"] = document.getElementById('v2').value;
            marksObj[sub + "_UT2"] = document.getElementById('v3').value;
            marksObj[sub + "_AN"] = document.getElementById('v4').value;
        }
        await fetch(API, { method: "POST", mode: 'no-cors', body: JSON.stringify({action: "updateMarks", rowIndex: parseInt(i), marksObj: marksObj}) });
        alert("UPDATED!"); sync();
    }

    function getStars(score) {
        if(score >= 35) return '⭐⭐⭐';
        if(score >= 25) return '⭐⭐';
        if(score >= 15) return '⭐';
        return '';
    }

    function printAll() {
        const cls = document.getElementById('pClass').value;
        let content = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] === cls) {
                let m = {}; try { m = JSON.parse(r[6] || "{}"); } catch(e) {}
                let grandTotal = 0;
                let subjects = ["HINDI ORAL", "HINDI WRITTEN", "ENGLISH ORAL", "ENGLISH WRITTEN", "MATHEMATICS ORAL", "MATHEMATICS WRITTEN"];
                
                let tableRows = subjects.map(s => {
                    let ut1 = Number(m[s+'_UT1']||0), hy = Number(m[s+'_HY']||0), ut2 = Number(m[s+'_UT2']||0), an = Number(m[s+'_AN']||0);
                    let t = ut1 + hy + ut2 + an;
                    grandTotal += t;
                    return `<tr style="height:40px;">
                        <td style="color:#0d47a1; font-weight:bold;">${s}</td>
                        <td>${ut1}</td><td>${hy}</td><td>${ut2}</td><td>${an}</td>
                        <td style="font-weight:bold;">${t}</td>
                        <td style="color:#b71c1c; font-size:12px;">${getStars(an)}</td>
                    </tr>`;
                }).join('');
                
                tableRows += `<tr style="height:40px;"><td style="font-weight:bold;">STORY TELLING</td><td colspan="4">GRADE</td><td>-</td><td style="font-weight:bold;">${m['STORY TELLING_TOTAL']||'-'}</td></tr>`;
                tableRows += `<tr style="height:40px;"><td style="font-weight:bold;">PHYSICAL ACTIVITY</td><td colspan="4">GRADE</td><td>-</td><td style="font-weight:bold;">${m['PHYSICAL ACTIVITY_TOTAL']||'-'}</td></tr>`;

                let cleanDOB = (r[5] || '').split('T')[0];

                content += `
                <div style="width:190mm; height:277mm; padding:10mm; margin:5mm auto; border:10px double #0d47a1; box-sizing:border-box; page-break-after:always; position:relative; overflow:hidden; background:white;">
                    
                    <div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0.50; z-index:0;">
                        ${Array.from({length: 45}).map(() => `<span style="position:absolute; top:${Math.random()*92}%; left:${Math.random()*92}%; font-size:24px;">${['🦋','☀️','🌼'][Math.floor(Math.random()*3)]}</span>`).join('')}
                    </div>

                    <div style="position:relative; z-index:1;">
                        <center>
                            <h1 style="color:#b71c1c; margin:0; font-size:30px; letter-spacing:1px;">K.R.R. JUNIOR HIGH SCHOOL</h1>
                            <p style="margin:4px 0; font-weight:bold; font-size:14px;">MANPUR, BAHERI, BAREILLY (U.P.)</p>
                            <h3 style="color:#8e6d05; margin:5px 0; font-size:18px;">SESSION: 2025-2026</h3>
                            <div style="border:2px solid #8e6d05; display:inline-block; padding:4px 25px; border-radius:10px; font-weight:bold; background:#fff8e1; color:#0d47a1;">PROGRESS REPORT</div>
                        </center>

                        <div style="margin:12px 0; display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:14px; border:1px solid #0d47a1; padding:10px; border-radius:8px; color:#0d47a1;">
                            <div>NAME: <b style="color:#000;">${r[0]}</b></div>
                            <div>ROLL NO: <b style="color:#000;">${r[4]}</b></div>
                            <div>FATHER: <b style="color:#000;">Mr. ${r[2]}</b></div>
                            <div>MOTHER: <b style="color:#000;">Mrs. ${r[1]}</b></div>
                            <div>CLASS: <b style="color:#000;">${r[3]}</b></div>
                            <div>DOB: <b style="color:#000;">${cleanDOB}</b></div>
                        </div>

                        <table border="1" style="width:100%; text-align:center; border-collapse:collapse; font-size:13px; border:1px solid #0d47a1;">
                            <tr style="background:#0d47a1; color:white; height:35px;">
                                <th style="width:30%;">SUBJECT</th><th>UT-1</th><th>HY</th><th>UT-2</th><th>ANNUAL</th><th>TOTAL</th><th>GRADE</th>
                            </tr>
                            ${tableRows}
                        </table>

                        <div style="margin-top:12px; border:1px solid #8e6d05; padding:12px; background:#fafafa; display:grid; grid-template-columns:1fr 1fr; font-weight:bold; font-size:15px; border-radius:8px;">
                            <div>GRAND TOTAL: <span style="color:#b71c1c;">${grandTotal} / 600</span></div>
                            <div>PERCENTAGE: <span style="color:#b71c1c;">${(grandTotal/6).toFixed(2)}%</span></div>
                            <div>RESULT: <span style="color:#b71c1c;">${grandTotal >= 198 ? 'PASSED' : 'FAILED'}</span></div>
                            <div>RANK: <span style="color:#b71c1c;">__________</span></div>
                        </div>

                        <p style="margin-top:12px; font-size:14px;"><b>REMARKS:</b> <span style="color:#0d47a1;">${grandTotal >= 198 ? 'EXCELLENT PERFORMANCE, KEEP IT UP.' : 'NEEDS IMPROVEMENT.'}</span></p>
                        
                        <div style="margin-top:45px; display:flex; justify-content:space-between; font-size:13px;">
                            <span style="border-top:1px solid #000; width:160px; text-align:center; padding-top:5px;">CLASS TEACHER SIGN</span>
                            <span style="border-top:1px solid #000; width:160px; text-align:center; padding-top:5px;">PRINCIPAL SIGN</span>
                        </div>
                    </div>
                </div>`;
            }
        });
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>@page{size: A4; margin:0;} body{margin:0; padding:0;}</style></head><body>${content}</body></html>`);
        win.document.close();
        setTimeout(() => win.print(), 1000);
    }
</script>
</body>
</html>
